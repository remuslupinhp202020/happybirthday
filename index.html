<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <!-- Thumbnail and Link Preview Meta Tags for Teams/Netlify -->
    <!-- Note: Replace YOUR_NETLIFY_URL once you deploy to Netlify -->
    <meta property="og:title" content="Happy Birthday Mynda! 🎉">
    <meta property="og:description" content="A special video card just for you! Love, Shraddha">
    <!-- Using the card image as the thumbnail -->
    <meta property="og:image" content="./assets/thumbnail.png">
    <meta property="og:type" content="website">
    <meta name="twitter:card" content="summary_large_image">

    <title>Happy Birthday Mynda - V3</title>
    <link rel="stylesheet" href="style.css">
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Pacifico&family=Poppins:wght@400;600&display=swap" rel="stylesheet">
</head>
<body>
    <!-- Floating Background Emojis -->
    <!-- 24 emojis for 3x background items -->
    <div class="floating-emoji e1">🧁</div>
    <div class="floating-emoji e2">🎈</div>
    <div class="floating-emoji e3">🎁</div>
    <div class="floating-emoji e4">🎂</div>
    <div class="floating-emoji e5">🎈</div>
    <div class="floating-emoji e6">🎁</div>
    <div class="floating-emoji e7">🧁</div>
    <div class="floating-emoji e8">🎈</div>
    <div class="floating-emoji e9">🎁</div>
    <div class="floating-emoji e10">🎂</div>
    <div class="floating-emoji e11">🎈</div>
    <div class="floating-emoji e12">🧁</div>
    <div class="floating-emoji e13">🎁</div>
    <div class="floating-emoji e14">🎈</div>
    <div class="floating-emoji e15">🧁</div>
    <div class="floating-emoji e16">🎂</div>
    <div class="floating-emoji e17">🎁</div>
    <div class="floating-emoji e18">🎈</div>
    <div class="floating-emoji e19">🧁</div>
    <div class="floating-emoji e20">🎁</div>
    <div class="floating-emoji e21">🎈</div>
    <div class="floating-emoji e22">🎂</div>
    <div class="floating-emoji e23">🧁</div>
    <div class="floating-emoji e24">🎁</div>

    <div class="scene-container">
        <!-- Date (Moved to Bottom Left) -->
        <div class="date-badge">22nd March, 2026</div>

        <h1 class="title">Happy Birthday,<br><span class="highlight">Mynda!</span></h1>
        
        <div class="video-like-frame">
            <img src="assets/mynda_birthday_v2.png" alt="Mynda's Birthday Party" class="dancing-scene">
        </div>
        
        <div class="signature">
            <p class="name">~ Shraddha ~</p>
        </div>

        <div class="controls">
            <button id="celebrateBtn" class="action-btn play-btn">▶ Play Video Card!</button>
            <button id="pauseBtn" class="action-btn pause-btn" style="display: none;">⏸ Pause</button>
        </div>
        
        <!-- Very Upbeat Happy Birthday Audio -->
        <audio id="bgMusic" src="https://cdn.pixabay.com/audio/2022/01/18/audio_d0a13f69d2.mp3" preload="auto" crossorigin="anonymous" loop></audio>
    </div>

    <!-- Canvas Confetti Library -->
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <script>
        // Start minimal confetti automatically
        var duration = 1000 * 60 * 60; // practically forever
        var end = Date.now() + duration;

        var confettiInterval = setInterval(function() {
            confetti({ particleCount: 2, angle: 60, spread: 55, origin: { x: 0 }, colors: ['#ff477e', '#ff99ac', '#ffd166', '#06d6a0', '#118ab2']});
            confetti({ particleCount: 2, angle: 120, spread: 55, origin: { x: 1 }, colors: ['#ff477e', '#ff99ac', '#ffd166', '#06d6a0', '#118ab2']});
        }, 250);

        const music = document.getElementById('bgMusic');
        const playBtn = document.getElementById('celebrateBtn');
        const pauseBtn = document.getElementById('pauseBtn');
        const dancingScene = document.querySelector('.dancing-scene');

        playBtn.addEventListener('click', function() {
            music.volume = 0.8;
            music.play().catch(e => console.log("Audio play failed:", e));

            playBtn.style.display = 'none';
            pauseBtn.style.display = 'inline-block';

            dancingScene.classList.add('intense-dance');

            // Intense confetti burst
            var endBurst = Date.now() + 5000;
            var defaults = { startVelocity: 30, spread: 360, ticks: 60, zIndex: 0 };
            function randomInRange(min, max) { return Math.random() * (max - min) + min; }

            var burstInterval = setInterval(function() {
                var timeLeft = endBurst - Date.now();
                if (timeLeft <= 0) return clearInterval(burstInterval);
                var particleCount = 50 * (timeLeft / 5000);
                confetti(Object.assign({}, defaults, { particleCount, origin: { x: randomInRange(0.1, 0.3), y: Math.random() - 0.2 } }));
                confetti(Object.assign({}, defaults, { particleCount, origin: { x: randomInRange(0.7, 0.9), y: Math.random() - 0.2 } }));
            }, 250);
        });

        pauseBtn.addEventListener('click', function() {
            music.pause();
            pauseBtn.style.display = 'none';
            playBtn.style.display = 'inline-block';
            dancingScene.classList.remove('intense-dance');
        });
    </script>
</body>
</html>
